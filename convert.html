<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert - SmartClean V3.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%); min-height:100vh; padding:40px 20px; font-family:'Segoe UI',sans-serif; }
        .container { max-width: 700px; }
        .card { border:none; border-radius:20px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
        .card-header { background:#1a2a6c; color:white; border-radius:20px 20px 0 0!important; padding:25px 30px; }
        .card-body { padding:35px; }
        
        .drop-zone { border:2px dashed #ced4da; border-radius:15px; padding:40px; text-align:center; cursor:pointer; transition:all .2s; background:#fafbfc; }
        .drop-zone:hover, .drop-zone.drag-over { border-color:#1a2a6c; background:#f0f4ff; }
        .drop-zone i { font-size:2.5rem; color:#adb5bd; margin-bottom:12px; }
        .btn-convert { background:#1a2a6c; border:none; padding:14px 40px; font-size:1.1rem; font-weight:600; transition:all .3s; }
        .btn-convert:hover { background:#2d4a9a; transform:translateY(-2px); box-shadow:0 5px 15px rgba(26,42,108,.3); }
        #file-name { font-size:.9rem; color:#6c757d; margin-top:10px; }
    </style>
</head>
<body>
<div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat,msg in messages %}
            <div class="alert alert-{{ cat }} alert-dismissible fade show mb-3">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
        {% endfor %}{% endif %}
    {% endwith %}

    <div class="mb-3">
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm">
            <i class="fas fa-arrow-left me-1"></i> Back
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <h4 class="mb-0"><i class="fas fa-retweet me-2"></i> File Converter</h4>
            <small class="opacity-75">Convert any file to any format instantly</small>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" id="convertForm">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Drop Zone -->
                <label class="drop-zone w-100" id="dropZone" for="fileInput">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <div class="fw-semibold">Drop your file here or click to browse</div>
                    <div class="text-muted small mt-1">CSV, Excel, JSON, XML, TSV, Parquet</div>
                </label>
                <input type="file" id="fileInput" name="file" class="d-none"
                       accept=".csv,.xlsx,.xls,.json,.xml,.tsv,.parquet">
                <div id="file-name" class="text-center"></div>

                <!-- Target Format -->
                <div class="mt-4">
                    <label class="form-label fw-semibold" for="fmt-select">
                        <i class="fas fa-exchange-alt me-1"></i> Convert to :
                    </label>
                    <select class="form-select form-select-lg" id="fmt-select" name="target_format">
                        <option value="csv">📄 CSV (.csv)</option>
                        <option value="xlsx">📊 Excel (.xlsx)</option>
                        <option value="json">🔷 JSON (.json)</option>
                        <option value="xml">📝 XML (.xml)</option>
                        <option value="tsv">📋 TSV (.tsv)</option>
                        <option value="parquet">🗄️ Parquet (.parquet)</option>
                    </select>
                </div>

                <div class="text-center mt-3">
                    <button type="submit" class="btn btn-primary btn-convert">
                        <i class="fas fa-retweet me-2"></i> Convert & Download
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; updateName(); }
});
fileInput.addEventListener('change', updateName);
function updateName() {
    const f = fileInput.files[0];
    document.getElementById('file-name').textContent = f ? '📄 ' + f.name + ' (' + (f.size/1024).toFixed(1) + ' KB)' : '';
}
</script>
</body>
</html>
